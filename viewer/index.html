<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytical Mechanics Viewer</title>
  </head>
  <body>
    <main id="app">
      <section class="stage" aria-label="Mechanics visualization">
        <canvas id="scene" class="stage__canvas stage__canvas--active"></canvas>
        <canvas id="hamiltonianScene" class="stage__canvas"></canvas>
      </section>
      <aside class="panel" aria-label="Simulation controls">
        <div class="panel__header">
          <p class="eyebrow">Selected System</p>
          <h1 id="systemTitle">Simple Pendulum</h1>
        </div>
        <label class="select-field">
          <span>system</span>
          <select id="systemSelect"></select>
        </label>
        <div>
          <p class="control-label">visualization</p>
          <div id="visualizationModes" class="mode-switch" aria-label="Visualization mode"></div>
        </div>
        <dl class="readout">
          <div>
            <dt><span id="readoutLabel0" data-latex="t"></span></dt>
            <dd id="readoutValue0">0.00 s</dd>
          </div>
          <div>
            <dt><span id="readoutLabel1" data-latex="\theta"></span></dt>
            <dd id="readoutValue1">0.000 rad</dd>
          </div>
          <div>
            <dt><span id="readoutLabel2" data-latex="\dot{\theta}"></span></dt>
            <dd id="readoutValue2">0.000 rad/s</dd>
          </div>
          <div>
            <dt><span id="readoutLabel3" data-latex="H"></span></dt>
            <dd id="readoutValue3">0.000</dd>
          </div>
        </dl>
        <div class="controls">
          <button id="playButton" type="button">Pause</button>
          <label>
            <span>speed</span>
            <input id="speedControl" type="range" min="0.2" max="3" step="0.1" value="1" />
          </label>
        </div>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
